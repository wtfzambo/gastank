name: CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**/*.go'
      - 'frontend/**'
      - 'build/**'
      - '.github/workflows/**'
      - 'go.mod'
      - 'go.sum'
      - 'Taskfile.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - '**/*.go'
      - 'frontend/**'
      - 'build/**'
      - '.github/workflows/**'
      - 'go.mod'
      - 'go.sum'
      - 'Taskfile.yml'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./internal/...

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
