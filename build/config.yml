version: 0.1.0
info:
  companyName: Felicity
  productName: Gastank
  productIdentifier: com.felicity.gastank
  description: AI token usage monitor
  copyright: (c) 2025, Felicity
  comments: AI token usage monitor
  version: 0.0.1
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - '*.go'
      - '*.js'
      - '*.ts'
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary
fileAssociations: null
other:
  - name: My Other Data
